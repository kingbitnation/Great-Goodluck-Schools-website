# Local Docker overrides (Windows) — publish ports to host for E2E/Lighthouse
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.local.yml --env-file .env.production up -d
#
# Uses the default postgres superuser when the DB volume was first created in dev mode.

services:
  db:
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  backend:
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/schooldb
    ports:
      - "4000:4000"
  frontend:
    ports:
      - "3000:3000"
