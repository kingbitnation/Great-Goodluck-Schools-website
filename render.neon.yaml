# Render Blueprint — backend API + external Neon PostgreSQL (no Render DB)
# Apply: render blueprint apply render.neon.yaml
# Docs: docs/LAUNCH_VERCEL_RAILWAY.md

services:
  - type: web
    name: schoolpilot-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: TRUST_PROXY
        value: "true"
      - key: RUN_SEED
        value: "false"
      - key: SKIP_DB_PUSH
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_HASH
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: PLATFORM_BANK_NAME
        sync: false
      - key: PLATFORM_BANK_ACCOUNT_NAME
        sync: false
      - key: PLATFORM_BANK_ACCOUNT_NUMBER
        sync: false
