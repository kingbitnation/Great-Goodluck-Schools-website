name: CI



on:

  push:

    branches: [main]

  pull_request:

    branches: [main]



jobs:

  validate-and-test:

    runs-on: ubuntu-latest

    services:

      postgres:

        image: postgres:15

        env:

          POSTGRES_USER: postgres

          POSTGRES_PASSWORD: postgres

          POSTGRES_DB: schooldb

        ports:

          - 5432:5432

        options: >-

          --health-cmd pg_isready

          --health-interval 10s

          --health-timeout 5s

          --health-retries 5



    env:

      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schooldb

      JWT_SECRET: test_secret_ci

      REFRESH_SECRET: test_refresh_ci

      NODE_ENV: test



    steps:

      - uses: actions/checkout@v4



      - uses: actions/setup-node@v4

        with:

          node-version: '20'

          cache: npm



      - name: Install dependencies

        run: npm ci



      - name: Validate Prisma schema

        run: npx prisma validate



      - name: Generate Prisma client

        run: npm run prisma:generate



      - name: Push schema and seed

        run: npx prisma db push && npm run prisma:seed



      - name: Start backend

        run: node src/backend/server.js &



      - name: Wait for backend

        run: node scripts/wait-for-backend.js



      - name: Smoke tests

        run: npm run test:all



      - name: Penetration unit tests

        run: node --test tests/unit/penetrationFocus.test.js



      - name: API E2E tests

        run: npx playwright install chromium --with-deps && npm run test:e2e

        env:

          API_URL: http://localhost:4000



      - name: Build frontend

        working-directory: src/frontend

        run: npm ci && npm run build

        env:

          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000



  docker-build:

    runs-on: ubuntu-latest

    needs: validate-and-test

    steps:

      - uses: actions/checkout@v4



      - name: Build backend image

        run: docker build -t schoolpilot-backend:ci .



      - name: Build frontend image

        run: docker build -f Dockerfile.frontend -t schoolpilot-frontend:ci .

