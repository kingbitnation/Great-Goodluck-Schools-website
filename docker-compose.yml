services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: schooldb
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d schooldb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/schooldb
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      REFRESH_SECRET: ${REFRESH_SECRET:-dev_refresh_change_me}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      RUN_SEED: ${RUN_SEED:-false}
    ports:
      - "4000:4000"
    volumes:
      - ./src/backend:/usr/src/app/src/backend
      - ./prisma:/usr/src/app/prisma
      - ./scripts:/usr/src/app/scripts
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/api/health/ready',(r)=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>process.exit(r.statusCode===200?0:1))}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        API_INTERNAL_URL: http://backend:4000
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      API_INTERNAL_URL: http://backend:4000
    ports:
      - "3000:3000"
    profiles:
      - full

volumes:
  db-data:
