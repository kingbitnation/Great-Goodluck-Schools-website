services:
  - type: web
    name: schoolpilot-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: TRUST_PROXY
        value: "true"
      - key: RUN_SEED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: schoolpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: PLATFORM_BANK_NAME
        sync: false
      - key: PLATFORM_BANK_ACCOUNT_NAME
        sync: false
      - key: PLATFORM_BANK_ACCOUNT_NUMBER
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TERMII_API_KEY
        sync: false
      - key: TERMII_SENDER_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false

databases:
  - name: schoolpilot-db
    plan: starter
