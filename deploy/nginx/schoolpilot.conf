# SchoolPilot — nginx reverse proxy with TLS + HSTS
# Place SSL certs at /etc/letsencrypt/live/schoolpilot.ng/
# Enable: ln -s deploy/nginx/schoolpilot.conf /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name app.schoolpilot.ng api.schoolpilot.ng;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend (app.schoolpilot.ng)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.schoolpilot.ng;

    ssl_certificate     /etc/letsencrypt/live/schoolpilot.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schoolpilot.ng/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # HSTS — 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# API (api.schoolpilot.ng) — includes Paystack webhook
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.schoolpilot.ng;

    ssl_certificate     /etc/letsencrypt/live/schoolpilot.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schoolpilot.ng/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
